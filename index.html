<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Sistema de Pedidos - Cafetería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark custom-navbar sticky-top shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-cup-hot-fill me-2"></i>Café Coffeetime
            </span>
        </div>
    </nav>

    <div class="container my-4">
        <div class="row g-4">

            <div class="col-lg-8">
                <div class="card shadow-sm p-3 mb-4 border-0">
                    <div class="row g-3 align-items-center">
                        <div class="col-md-5">
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 text-muted">
                                    <i class="bi bi-search"></i>
                                </span>
                                <input type="text" id="search-input" class="form-control border-start-0 ps-0"
                                    placeholder="Buscar producto...">
                            </div>
                        </div>
                        <div class="col-md-7">
                            <div class="d-flex flex-wrap gap-2 justify-content-md-end" id="category-filters">
                                <button class="todo btn btn-custom-filter" data-category="todos">Todas</button>
                                <button class="bebida-caliente btn btn-custom-filter" data-category="Bebida caliente">Bebidas
                                    calientes</button>
                                <button class="bebida-fria btn btn-custom-filter" data-category="Bebida fría">Bebidas frías</button>
                                <button class="postre btn btn-custom-filter" data-category="Postre">Postres</button>
                                <button class="comida btn btn-custom-filter" data-category="Postre">Comida</button>
                            </div>
                        </div>
                    </div>
                </div>

                <h3 class="h5 mb-3 text-secondary fw-bold">Productos Disponibles</h3>
                <div class="row row-cols-1 row-cols-md-2 g-3" id="products-container">
                </div>
            </div>

            <div class="col-lg-4">
                <div class="sticky-sidebar">

                    <div class="card shadow-sm border-0 mb-4">
                        <div
                            class="card-header bg-white py-3 border-0 d-flex justify-content-between align-items-center">
                            <h3 class="h5 mb-0 fw-bold text-dark">
                                <i class="bi bi-receipt me-2 text-primary"></i>Tu Pedido
                            </h3>
                        </div>

                        <div class="card-body p-0 max-height-order" id="order-items-container">
                        </div>

                        <div class="card-footer bg-light p-3 border-0">
                            <div class="d-flex justify-content-between mb-2 text-secondary">
                                <span>Subtotal:</span>
                                <span id="summary-subtotal">Q0.00</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2 text-secondary">
                                <span>Impuesto/Recargo (5%):</span>
                                <span id="summary-tax">Q0.00</span>
                            </div>
                            <hr class="my-2">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <span class="fw-bold text-dark fs-5">Total:</span>
                                <span class="fw-bold text-primary fs-4" id="summary-total">Q0.00</span>
                            </div>
                            <div class="row g-2">
                                <div class="col-6">
                                    <button
                                        class="btn btn-outline-danger w-100 rounded-pill py-2 text-uppercase font-monospace small fw-bold"
                                        id="btn-clear">
                                        <i class="bi bi-trash me-1"></i> Vaciar
                                    </button>
                                </div>
                                <div class="col-6">
                                    <button
                                        class="btn btn-primary w-100 rounded-pill py-2 text-uppercase font-monospace small fw-bold shadow-sm"
                                        id="btn-checkout" data-bs-toggle="modal" data-bs-target="#modalResumen">
                                        <i class="bi bi-check2-circle me-1"></i> Finalizar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>
    
    <div class="modal fade" id="modalResumen" tabindex="-1" aria-labelledby="modalResumenLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-success text-white border-0 py-3">
                    <h5 class="modal-title fw-bold" id="modalResumenLabel">
                        <i class="bi bi-check-circle-fill me-2"></i>¡Pedido Finalizado!
                    </h5>
                    <button type="text" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 text-center">
                    <div class="mb-3 text-success">
                        <i class="bi bi-bag-heart display-1"></i>
                    </div>
                    <h4 class="fw-bold text-dark mb-1">¡Gracias por tu compra!</h4>
                    <p class="text-muted small">A continuación verás el resumen de tu orden:</p>
                    <hr class="my-3">

                    <div class="text-start bg-light p-3 rounded mb-3" id="modal-receipt-items">
                        <p class="fw-bold text-secondary border-bottom pb-1 mb-2">Productos:</p>
                    </div>

                    <div
                        class="d-flex justify-content-between align-items-center bg-amber-light p-2 rounded text-dark fw-bold mb-2">
                        <span>Total pagado:</span>
                        <span class="fs-5 text-primary" id="modal-total-paid">Q0.00</span>
                    </div>
                </div>
                <div class="modal-footer border-0 bg-light">
                    <button id="btnTerminarCompra" type="button" class="btn btn-secondary w-100 rounded-pill py-2"
                        data-bs-dismiss="modal">Cerrar y Nueva Orden</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
